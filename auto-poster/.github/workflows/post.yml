name: Daily Auto Post

on:
  # San Antonio at 2PM CT (19:00 UTC), Austin at 3PM CT (20:00 UTC), DFW at 4PM CT (21:00 UTC)
  schedule:
    - cron: '0 19 * * *'   # San Antonio — 2PM CT daily
    - cron: '0 20 * * *'   # Austin — 3PM CT daily
    - cron: '0 21 * * *'   # Dallas/DFW — 4PM CT every other day (handled in script)
  workflow_dispatch:
    inputs:
      city:
        description: 'City to post for (san_antonio, austin, dallas)'
        required: true
        default: 'san_antonio'
        type: choice
        options:
          - san_antonio
          - austin
          - dallas
      dry_run:
        description: 'Dry run (no actual posting)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  post-san-antonio:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.city == 'san_antonio' || github.event.schedule == '0 19 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        working-directory: auto-poster
        run: npm install
      - name: Run auto-poster (San Antonio)
        working-directory: auto-poster
        env:
          CITY: san_antonio
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          METRICOOL_API_TOKEN: ${{ secrets.METRICOOL_API_TOKEN }}
          METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
          METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node src/main.js
      - name: Commit posted-log
        run: |
          cd auto-poster
          git config user.name "Auto Poster Bot"
          git config user.email "bot@lifestyle-design.com"
          git add posted-log.json
          git diff --cached --quiet || git commit -m "📸 SA post $(date -u +%Y-%m-%d)"
          git push

  post-austin:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.city == 'austin' || github.event.schedule == '0 20 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        working-directory: auto-poster
        run: npm install
      - name: Run auto-poster (Austin)
        working-directory: auto-poster
        env:
          CITY: austin
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          METRICOOL_API_TOKEN: ${{ secrets.METRICOOL_API_TOKEN }}
          METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
          METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node src/main.js
      - name: Commit posted-log
        run: |
          cd auto-poster
          git config user.name "Auto Poster Bot"
          git config user.email "bot@lifestyle-design.com"
          git add posted-log.json
          git diff --cached --quiet || git commit -m "📸 ATX post $(date -u +%Y-%m-%d)"
          git push

  post-dallas:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.city == 'dallas' || github.event.schedule == '0 21 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        working-directory: auto-poster
        run: npm install
      - name: Check if DFW posts today (every other day)
        id: check-day
        run: |
          DAY_OF_YEAR=$(date +%j)
          if [ $((DAY_OF_YEAR % 2)) -eq 0 ]; then
            echo "should_post=true" >> $GITHUB_OUTPUT
          else
            echo "should_post=false" >> $GITHUB_OUTPUT
            echo "DFW posts every other day — skipping today"
          fi
      - name: Run auto-poster (Dallas/DFW)
        if: steps.check-day.outputs.should_post == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: auto-poster
        env:
          CITY: dallas
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          METRICOOL_API_TOKEN: ${{ secrets.METRICOOL_API_TOKEN }}
          METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
          METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node src/main.js
      - name: Commit posted-log
        if: steps.check-day.outputs.should_post == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cd auto-poster
          git config user.name "Auto Poster Bot"
          git config user.email "bot@lifestyle-design.com"
          git add posted-log.json
          git diff --cached --quiet || git commit -m "📸 DFW post $(date -u +%Y-%m-%d)"
          git push
