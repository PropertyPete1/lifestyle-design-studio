<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Lifestyle Design Studio</title>

    <!-- PWA: installable to home screen -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="description" content="Daily Instagram Reels dashboard for Lifestyle Design Realty Texas — Austin & San Antonio." />

    <!-- iOS home-screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LDS Studio" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root">
      <!-- Boot fallback: shown until React mounts. If the app fails to load,
           this stays visible instead of a blank screen so the user has a path. -->
      <div id="boot-fallback" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#0f0f10;color:#e7e2d6;font-family:Inter,system-ui,sans-serif;padding:24px;text-align:center">
        <div style="width:34px;height:34px;border:3px solid rgba(231,226,214,.25);border-top-color:#c8a96a;border-radius:50%;animation:bootspin .8s linear infinite"></div>
        <div style="font-size:14px;opacity:.8">Loading Daily Reels…</div>
        <noscript style="font-size:13px;opacity:.7">This app needs JavaScript enabled.</noscript>
      </div>
    </div>
    <style>@keyframes bootspin{to{transform:rotate(360deg)}}</style>

    <!-- Early cache/service-worker guard: runs BEFORE the app bundle so a
         broken cached shell from an old service worker can never trap the
         device on "blank blocks". Unregisters any SW and purges caches. -->
    <script>
      (function () {
        try {
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations()
              .then(function (regs) { regs.forEach(function (r) { r.unregister(); }); })
              .catch(function () {});
          }
          if (typeof caches !== "undefined" && caches.keys) {
            caches.keys()
              .then(function (keys) { keys.forEach(function (k) { caches.delete(k); }); })
              .catch(function () {});
          }
        } catch (e) { /* never block boot */ }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
