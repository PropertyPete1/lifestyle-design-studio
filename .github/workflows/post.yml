name: Daily Auto Post

# 5-SLOT SCHEDULE (Central Time → UTC during CDT):
# SA-am 11:00 AM = 16:00, ATX-am 12:00 PM = 17:00,
# SA-pm 2:00 PM = 19:00, ATX-pm 3:00 PM = 20:00, DFW-pm 4:00 PM = 21:00
# Each slot has a :30 backup cron. The slot-aware idempotency guard makes this safe.
on:
  schedule:
    # SA AM: 11:00 AM CT = 16:00 UTC (primary), 11:30 AM CT = 16:30 UTC (backup)
    - cron: '0 16 * * *'
    - cron: '30 16 * * *'
    # ATX AM: 12:00 PM CT = 17:00 UTC (primary), 12:30 PM CT = 17:30 UTC (backup)
    - cron: '0 17 * * *'
    - cron: '30 17 * * *'
    # SA PM: 2:00 PM CT = 19:00 UTC (primary), 2:30 PM CT = 19:30 UTC (backup)
    - cron: '0 19 * * *'
    - cron: '30 19 * * *'
    # ATX PM: 3:00 PM CT = 20:00 UTC (primary), 3:30 PM CT = 20:30 UTC (backup)
    - cron: '0 20 * * *'
    - cron: '30 20 * * *'
    # DFW PM: 4:00 PM CT = 21:00 UTC (primary), 4:30 PM CT = 21:30 UTC (backup)
    - cron: '0 21 * * *'
    - cron: '30 21 * * *'
  workflow_dispatch:
    inputs:
      city:
        description: 'City to post for (san_antonio, austin, dallas)'
        required: true
        default: 'san_antonio'
        type: choice
        options:
          - san_antonio
          - austin
          - dallas
      slot:
        description: 'Time slot (am or pm). Dallas is always pm.'
        required: false
        default: 'pm'
        type: choice
        options:
          - am
          - pm
      dry_run:
        description: 'Dry run (no actual posting)'
        required: false
        default: false
        type: boolean
      force:
        description: 'Force post (bypass guards for manual testing)'
        required: false
        default: false
        type: boolean
      test_delivery_only:
        description: 'Test delivery only (real Drive upload + email + dashboard, ZERO social posts)'
        required: false
        default: false
        type: boolean
      force_video_id:
        description: 'Pin a specific Drive file ID (bypasses rotation/filtering)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  post-san-antonio:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.city == 'san_antonio')
      || github.event.schedule == '0 16 * * *'
      || github.event.schedule == '30 16 * * *'
      || github.event.schedule == '0 19 * * *'
      || github.event.schedule == '30 19 * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: autopost-san_antonio
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ffmpeg & whisper
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install openai-whisper --quiet
      - name: Install dependencies
        working-directory: auto-poster
        run: npm install
      - name: Determine slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.slot || 'pm' }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 16 * * *" ] || [ "${{ github.event.schedule }}" = "30 16 * * *" ]; then
            echo "value=am" >> $GITHUB_OUTPUT
          else
            echo "value=pm" >> $GITHUB_OUTPUT
          fi
      - name: Run auto-poster (San Antonio)
        id: run-poster
        working-directory: auto-poster
        env:
          CITY: san_antonio
          SLOT: ${{ steps.slot.outputs.value }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          TEST_DELIVERY_ONLY: ${{ github.event.inputs.test_delivery_only || 'false' }}
          FORCE_VIDEO_ID: ${{ github.event.inputs.force_video_id || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          METRICOOL_API_TOKEN: ${{ secrets.METRICOOL_API_TOKEN }}
          METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
          METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          DASHBOARD_WEBHOOK_SECRET: ${{ secrets.DASHBOARD_WEBHOOK_SECRET }}
        run: |
          if node src/main.js; then
            echo "post_success=true" >> $GITHUB_OUTPUT
          else
            echo "post_success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Commit posted-log
        if: always()
        run: |
          cd auto-poster
          git config user.name "Auto Poster Bot"
          git config user.email "bot@lifestyle-design.com"
          node merge-log-push.mjs SA "${{ steps.run-poster.outputs.post_success }}"

  post-austin:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.city == 'austin')
      || github.event.schedule == '0 17 * * *'
      || github.event.schedule == '30 17 * * *'
      || github.event.schedule == '0 20 * * *'
      || github.event.schedule == '30 20 * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: autopost-austin
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ffmpeg & whisper
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install openai-whisper --quiet
      - name: Install dependencies
        working-directory: auto-poster
        run: npm install
      - name: Determine slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.slot || 'pm' }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 17 * * *" ] || [ "${{ github.event.schedule }}" = "30 17 * * *" ]; then
            echo "value=am" >> $GITHUB_OUTPUT
          else
            echo "value=pm" >> $GITHUB_OUTPUT
          fi
      - name: Run auto-poster (Austin)
        id: run-poster
        working-directory: auto-poster
        env:
          CITY: austin
          SLOT: ${{ steps.slot.outputs.value }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          TEST_DELIVERY_ONLY: ${{ github.event.inputs.test_delivery_only || 'false' }}
          FORCE_VIDEO_ID: ${{ github.event.inputs.force_video_id || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          METRICOOL_API_TOKEN: ${{ secrets.METRICOOL_API_TOKEN }}
          METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
          METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          DASHBOARD_WEBHOOK_SECRET: ${{ secrets.DASHBOARD_WEBHOOK_SECRET }}
        run: |
          if node src/main.js; then
            echo "post_success=true" >> $GITHUB_OUTPUT
          else
            echo "post_success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Commit posted-log
        if: always()
        run: |
          cd auto-poster
          git config user.name "Auto Poster Bot"
          git config user.email "bot@lifestyle-design.com"
          node merge-log-push.mjs ATX "${{ steps.run-poster.outputs.post_success }}"

  post-dallas:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.city == 'dallas')
      || github.event.schedule == '0 21 * * *'
      || github.event.schedule == '30 21 * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: autopost-dallas
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ffmpeg & whisper
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install openai-whisper --quiet
      - name: Install dependencies
        working-directory: auto-poster
        run: npm install
      - name: Run auto-poster (Dallas/DFW)
        id: run-poster
        working-directory: auto-poster
        env:
          CITY: dallas
          SLOT: pm
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          TEST_DELIVERY_ONLY: ${{ github.event.inputs.test_delivery_only || 'false' }}
          FORCE_VIDEO_ID: ${{ github.event.inputs.force_video_id || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          METRICOOL_API_TOKEN: ${{ secrets.METRICOOL_API_TOKEN }}
          METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
          METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
