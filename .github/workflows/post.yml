name: Daily Auto Post

# BACKUP CRONS: GitHub cron is unreliable (delays, silent skips ).
# Each city fires twice — the 20-hour idempotency guard in the script
# makes this safe: if the first cron posted, the backup exits cleanly.
on:
  schedule:
    # San Antonio: 2:00 PM CT = 19:00 UTC (primary), 2:30 PM CT = 19:30 UTC (backup)
    - cron: '0 19 * * *'
    - cron: '30 19 * * *'
    # Austin: 3:00 PM CT = 20:00 UTC (primary), 3:30 PM CT = 20:30 UTC (backup)
    - cron: '0 20 * * *'
    - cron: '30 20 * * *'
    # Dallas: 4:00 PM CT = 21:00 UTC (primary), 4:30 PM CT = 21:30 UTC (backup)
    - cron: '0 21 * * *'
    - cron: '30 21 * * *'
  workflow_dispatch:
    inputs:
      city:
        description: 'City to post for (san_antonio, austin, dallas)'
        required: true
        default: 'san_antonio'
        type: choice
        options:
          - san_antonio
          - austin
          - dallas
      dry_run:
        description: 'Dry run (no actual posting)'
        required: false
        default: false
        type: boolean
      force:
        description: 'Force post (bypass every-other-day check for Dallas)'
        required: false
        default: false
        type: boolean
      test_delivery_only:
        description: 'Test delivery only (real Drive upload + email + dashboard, ZERO social posts)'
        required: false
        default: false
        type: boolean
      force_video_id:
        description: 'Pin a specific Drive file ID (bypasses rotation/filtering)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  post-san-antonio:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.city == 'san_antonio')
      || github.event.schedule == '0 19 * * *'
      || github.event.schedule == '30 19 * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: autopost-san_antonio
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ffmpeg & whisper
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install openai-whisper --quiet
      - name: Install dependencies
        working-directory: auto-poster
        run: npm install
      - name: Run auto-poster (San Antonio)
        id: run-poster
        working-directory: auto-poster
        env:
          CITY: san_antonio
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          TEST_DELIVERY_ONLY: ${{ github.event.inputs.test_delivery_only || 'false' }}
          FORCE_VIDEO_ID: ${{ github.event.inputs.force_video_id || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          METRICOOL_API_TOKEN: ${{ secrets.METRICOOL_API_TOKEN }}
          METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
          METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          DASHBOARD_WEBHOOK_SECRET: ${{ secrets.DASHBOARD_WEBHOOK_SECRET }}
        run: |
          if node src/main.js; then
            echo "post_success=true" >> $GITHUB_OUTPUT
          else
            echo "post_success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Commit posted-log
        if: always()
        run: |
          cd auto-poster
          git config user.name "Auto Poster Bot"
          git config user.email "bot@lifestyle-design.com"
          node merge-log-push.mjs SA "${{ steps.run-poster.outputs.post_success }}"

  post-austin:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.city == 'austin')
      || github.event.schedule == '0 20 * * *'
      || github.event.schedule == '30 20 * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: autopost-austin
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ffmpeg & whisper
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install openai-whisper --quiet
      - name: Install dependencies
        working-directory: auto-poster
        run: npm install
      - name: Run auto-poster (Austin)
        id: run-poster
        working-directory: auto-poster
        env:
          CITY: austin
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          TEST_DELIVERY_ONLY: ${{ github.event.inputs.test_delivery_only || 'false' }}
          FORCE_VIDEO_ID: ${{ github.event.inputs.force_video_id || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          METRICOOL_API_TOKEN: ${{ secrets.METRICOOL_API_TOKEN }}
          METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
          METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          DASHBOARD_WEBHOOK_SECRET: ${{ secrets.DASHBOARD_WEBHOOK_SECRET }}
        run: |
          if node src/main.js; then
            echo "post_success=true" >> $GITHUB_OUTPUT
          else
            echo "post_success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Commit posted-log
        if: always()
        run: |
          cd auto-poster
          git config user.name "Auto Poster Bot"
          git config user.email "bot@lifestyle-design.com"
          node merge-log-push.mjs ATX "${{ steps.run-poster.outputs.post_success }}"

  post-dallas:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.city == 'dallas')
      || github.event.schedule == '0 21 * * *'
      || github.event.schedule == '30 21 * * *'
    runs-on: ubuntu-latest
    concurrency:
      group: autopost-dallas
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ffmpeg & whisper
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install openai-whisper --quiet
      - name: Install dependencies
        working-directory: auto-poster
        run: npm install
      - name: Check if DFW posts today (every other day)
        id: check-day
        run: |
          DAY_OF_YEAR=$(date +%j)
          if [ $((DAY_OF_YEAR % 2)) -eq 0 ]; then
            echo "should_post=true" >> $GITHUB_OUTPUT
          else
            echo "should_post=false" >> $GITHUB_OUTPUT
            echo "DFW posts every other day — skipping today"
          fi
      - name: Run auto-poster (Dallas/DFW)
        id: run-poster
        if: steps.check-day.outputs.should_post == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: auto-poster
        env:
          CITY: dallas
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          TEST_DELIVERY_ONLY: ${{ github.event.inputs.test_delivery_only || 'false' }}
          FORCE_VIDEO_ID: ${{ github.event.inputs.force_video_id || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          METRICOOL_API_TOKEN: ${{ secrets.METRICOOL_API_TOKEN }}
          METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
          METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          DASHBOARD_WEBHOOK_SECRET: ${{ secrets.DASHBOARD_WEBHOOK_SECRET }}
        run: |
          if node src/main.js; then
            echo "post_success=true" >> $GITHUB_OUTPUT
          else
            echo "post_success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
      - name: Commit posted-log
        if: always() && (steps.check-day.outputs.should_post == 'true' || github.event_name == 'workflow_dispatch')
        run: |
          cd auto-poster
          git config user.name "Auto Poster Bot"
          git config user.email "bot@lifestyle-design.com"
          node merge-log-push.mjs DFW "${{ steps.run-poster.outputs.post_success }}"
