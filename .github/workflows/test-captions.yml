name: Caption Test
on:
  workflow_dispatch:
jobs:
  test-captions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auto-poster
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: node scripts/test-caption-dry-run.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
